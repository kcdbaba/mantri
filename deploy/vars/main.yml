# Plaintext deployment vars — safe to commit
app_dir: /opt/mantri
venv_dir: /opt/mantri/venv
db_path: /opt/mantri/data/mantri.db
logs_dir: /opt/mantri/logs
repo_url: https://github.com/kcdbaba/mantri.git
repo_branch: main
requirements_file: requirements-prod.txt

redis_url: "redis://localhost:6379"
ingest_queue_key: "ingest_queue"
task_events_stream: "task_events"
cron_interval_seconds: 900
claude_model: "claude-sonnet-4-6"

phoenix_port: 6006
static_dir: "{{ app_dir }}/static"
